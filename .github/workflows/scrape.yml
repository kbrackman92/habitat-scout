name: Daily scrape

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "httpx[http2]" beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scrape_daily.py
        continue-on-error: true

      - name: Commit listings.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.json 2>/dev/null || true
          git add state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scrape: $(date -u +%Y-%m-%d)"
            git push
          fi
